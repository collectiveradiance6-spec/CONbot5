<!-- ═══════════════════════════════════════════════════════════════
     CONbot5 — CONCLAVE LIQUID GLASS SYSTEM
     Add these tags to apps/web/index.html

     1. In <head>, after your existing CSS links:
     ═══════════════════════════════════════════════════════════════ -->

  <!-- Conclave Liquid Glass fonts (add to existing Google Fonts link or as standalone) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700;900&family=Exo+2:wght@400;600;700;900&family=JetBrains+Mono:wght@400;500&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">

  <!-- Conclave Liquid Glass CSS -->
  <link rel="stylesheet" href="/public/conclave-liquid-glass.css" />

<!-- ═══════════════════════════════════════════════════════════════
     2. At the END of <body>, just before </body>:
     ═══════════════════════════════════════════════════════════════ -->

  <!-- Conclave Liquid Glass JS system (load order matters) -->
  <script defer src="/public/conclave-bg-orchestrator.js"></script>
  <script defer src="/public/conclave-water-ripples.js"></script>
  <script defer src="/public/conclave-pixel-actors.js"></script>
  <script defer src="/public/conclave-emblem-os.js"></script>

<!-- ═══════════════════════════════════════════════════════════════
     NOTE: If your project serves public assets from a path OTHER
     than /public/, adjust hrefs/srcs to match — e.g. /assets/ or
     just / if files sit in the web root.

     The 4 JS files inject the emblem DOM automatically.
     No other HTML changes are required.
