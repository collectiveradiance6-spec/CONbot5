name = "conbot5-api"
main = "index_full.js"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

[vars]
# ─── Put non-secret values here ───────────────────────────────
# These are visible in your Cloudflare dashboard — no secrets!
DISCORD_CLIENT_ID = "YOUR_DISCORD_CLIENT_ID_HERE"
GUILD_ID          = "1438103556610723922"
BOT_API_URL       = "https://conbot5.onrender.com"
BOT_WS_URL        = "wss://conbot5.onrender.com/ws"

# ─── Secrets go in HERE — run these commands once in terminal ──
#
#   wrangler secret put DISCORD_CLIENT_SECRET
#   (paste the client secret from Discord Dev Portal, press Enter)
#
#   wrangler secret put DISCORD_BOT_TOKEN
#   (paste your bot token)
#
#   wrangler secret put JWT_SECRET
#   (paste a 64-char random hex — generate with:)
#   (node -e "console.log(require('crypto').randomBytes(64).toString('hex'))")
#
#   wrangler secret put INTERNAL_SECRET
#   (paste same value you'll add to Render as INTERNAL_SECRET)
#
#   wrangler secret put ADMIN_ROLE_IDS
#   (paste comma-separated role IDs, e.g.: 123456789012345678,987654321098765432)
#   (to get a role ID: Discord → Server Settings → Roles → right-click → Copy Role ID)
#   (you need Developer Mode on: Discord Settings → Advanced → Developer Mode)
