services:
  - type: web
    name: conbot5-api
    env: node
    rootDir: services/api
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "5000"
      - key: ALLOWED_ORIGINS
        value: "https://conbot5.pages.dev"
      - key: BOT_TOKEN
        sync: false
      - key: DISCORD_CLIENT_ID
        sync: false
      - key: DISCORD_CLIENT_SECRET
        sync: false
      - key: SPOTIFY_CLIENT_ID
        sync: false
      - key: SPOTIFY_CLIENT_SECRET
        sync: false
      - key: YOUTUBE_API_KEY
        sync: false
      - key: SOUNDCLOUD_CLIENT_ID
        sync: false
    healthCheckPath: /health
    autoDeploy: true
